<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Color Flow Endless</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --neon-pink: #ff007f;
            --neon-cyan: #00f3ff;
            --neon-green: #39ff14;
            --neon-yellow: #fffb00;
            --neon-purple: #b026ff;
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 10;
            padding: 5;
        }

        body, html {
            width: 100%;
            height: 90%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100vh; /* Forced Viewport Height to prevent Blogger auto-collapse */
            max-width: 600px;
            margin: 0 auto;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
            background: radial-gradient(circle at center, #1f2833 0%, #0b0c10 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(11, 12, 16, 0.9);
            backdrop-filter: blur(8px);
            z-index: 10;
            transition: opacity 0.3s ease;
        }

        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }

        h1 {
            font-size: 2.5rem;
            color: var(--text-main);
            text-shadow: 0 0 10px var(--neon-cyan), 0 0 20px var(--neon-purple);
            margin-bottom: 20px;
            text-align: center;
            letter-spacing: 2px;
            line-height: 1.2;
        }

        .score-display {
            font-size: 1.2rem;
            color: var(--neon-green);
            margin-bottom: 30px;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
        }

        .btn {
            padding: 12px 35px;
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--text-main);
            background: transparent;
            border: 2px solid var(--neon-pink);
            border-radius: 25px;
            cursor: pointer;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 10px;
        }

        .btn:hover, .btn:active {
            background: var(--neon-pink);
            box-shadow: 0 0 20px var(--neon-pink);
            transform: scale(1.05);
        }

        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            pointer-events: none;
            z-index: 5;
        }

        .hud-item {
            color: var(--text-main);
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
        }

        #hud-right {
            display: flex;
            gap: 10px;
            align-items: center;
            pointer-events: auto;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--neon-cyan);
            color: var(--text-main);
            border-radius: 5px;
            padding: 5px 10px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        #timer-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            z-index: 5;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--neon-cyan);
            box-shadow: 0 0 8px var(--neon-cyan);
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="hud">
        <div id="hud-left">
            <div class="hud-item" id="score-val">SCORE: 0</div>
            <div class="hud-item" id="combo-val" style="color: var(--neon-yellow)">COMBO: x1</div>
        </div>
        <div id="hud-right">
            <div class="hud-item" id="lives-val" style="color: var(--neon-pink)">❤️❤️❤️</div>
            <button class="control-btn" id="pause-btn">PAUSE</button>
            <button class="control-btn" id="fs-btn">⛶</button>
        </div>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>

    <canvas id="gameCanvas"></canvas>

    <div id="menu-overlay" class="overlay">
        <h1>COLOR FLOW<br><span style="color: var(--neon-cyan); font-size: 1.8rem;">ENDLESS</span></h1>
        <div class="score-display" id="best-score-display">HIGH SCORE: 0</div>
        <button class="btn" id="start-btn">Play Game</button>
    </div>

    <div id="pause-overlay" class="overlay hidden">
        <h1>GAME PAUSED</h1>
        <button class="btn" id="resume-btn">Resume</button>
    </div>

    <div id="gameover-overlay" class="overlay hidden">
        <h1 style="color: var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink)">GAME OVER</h1>
        <div class="score-display" id="final-score-display">SCORE: 0</div>
        <button class="btn" id="restart-btn">Try Again</button>
    </div>
</div>

<script>
    const SoundSynth = {
        ctx: null,
        init() {
            if (!this.ctx) {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            }
        },
        play(type) {
            this.init();
            if (!this.ctx) return;
            if (this.ctx.state === 'suspended') this.ctx.resume();

            const osc = this.ctx.createOscillator();
            const gain = this.ctx.createGain();
            osc.connect(gain);
            gain.connect(this.ctx.destination);

            const now = this.ctx.currentTime;

            if (type === 'success') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.1);
                osc.start(now); osc.stop(now + 0.1);
            } else if (type === 'fail') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(180, now);
                osc.frequency.linearRampToValueAtTime(60, now + 0.25);
                gain.gain.setValueAtTime(0.2, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.25);
                osc.start(now); osc.stop(now + 0.25);
            } else if (type === 'gem') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.setValueAtTime(900, now + 0.07);
                gain.gain.setValueAtTime(0.15, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.15);
                osc.start(now); osc.stop(now + 0.15);
            } else if (type === 'powerup') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(1200, now + 0.3);
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.linearRampToValueAtTime(0, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            }
        }
    };

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    let state = {
        score: 0,
        highScore: parseInt(localStorage.getItem('cf_highscore')) || 0,
        lives: 3,
        combo: 1,
        comboTracker: 0,
        speed: 1.0,
        baseTimeout: 4000,
        timer: 1.0,
        isPlaying: false,
        isPaused: false,
        activePowerup: null,
        powerupTime: 0
    };

    const DIR = { UP: 0, RIGHT: 1, DOWN: 2, LEFT: 3 };
    const COLORS = ['#ff007f', '#00f3ff', '#39ff14', '#fffb00', '#b026ff'];
    
    let pathSegments = [];
    let particles = [];
    let inputStart = { x: 0, y: 0 };
    let lastTime = 0;

    class Segment {
        constructor(index, dynamicDirection) {
            this.index = index;
            this.direction = dynamicDirection !== undefined ? dynamicDirection : Math.floor(Math.random() * 4);
            this.color = COLORS[Math.floor(Math.random() * COLORS.length)];
            this.item = null;
            if (index > 2 && Math.random() < 0.3) {
                let rand = Math.random();
                if (rand < 0.7) this.item = 'gem';
                else if (rand < 0.85) this.item = 'shield';
                else this.item = 'slowmo';
            }
        }
    }

    class Particle {
        constructor(x, y, color) {
            this.x = x;
            this.y = y;
            this.color = color;
            this.vx = (Math.random() - 0.5) * 8;
            this.vy = (Math.random() - 0.5) * 8;
            this.alpha = 1;
            this.radius = Math.random() * 3 + 2;
        }
        update() {
            this.x += this.vx;
            this.y += this.vy;
            this.alpha -= 0.02;
        }
        draw() {
            ctx.save();
            ctx.globalAlpha = Math.max(0, this.alpha);
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        
        // Defensively fall back to display sizes if layout engine reports 0
        const w = rect.width > 0 ? rect.width : (window.innerWidth > 0 ? window.innerWidth : 360);
        const h = rect.height > 0 ? rect.height : (window.innerHeight > 0 ? window.innerHeight : 640);
        
        canvas.width = w * dpr;
        canvas.height = h * dpr;
        ctx.scale(dpr, dpr);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function initPath() {
        pathSegments = [];
        for (let i = 0; i < 5; i++) {
            pathSegments.push(new Segment(i, i === 0 ? DIR.UP : undefined));
        }
    }

    function advancePath() {
        const activeSegment = pathSegments[0];
        if (activeSegment && activeSegment.item) {
            if (activeSegment.item === 'gem') {
                state.score += 50 * state.combo;
                SoundSynth.play('gem');
                spawnParticles(canvas.width / (window.devicePixelRatio || 1) / 2, canvas.height / (window.devicePixelRatio || 1) * 0.65, '#fffb00');
            } else {
                state.activePowerup = activeSegment.item;
                state.powerupTime = 5.0;
                SoundSynth.play('powerup');
                spawnParticles(canvas.width / (window.devicePixelRatio || 1) / 2, canvas.height / (window.devicePixelRatio || 1) * 0.65, '#00f3ff');
            }
        }

        pathSegments.shift();
        pathSegments.push(new Segment(4));
        state.timer = 1.0;
        state.speed += 0.04;
    }

    function spawnParticles(x, y, color) {
        for (let i = 0; i < 15; i++) {
            particles.push(new Particle(x, y, color));
        }
    }

    function handleInputStart(clientX, clientY) {
        if (!state.isPlaying || state.isPaused) return;
        const rect = canvas.getBoundingClientRect();
        inputStart.x = clientX - rect.left;
        inputStart.y = clientY - rect.top;
    }

    function handleInputEnd(clientX, clientY) {
        if (!state.isPlaying || state.isPaused) return;
        const rect = canvas.getBoundingClientRect();
        const endX = clientX - rect.left;
        const endY = clientY - rect.top;

        const dx = endX - inputStart.x;
        const dy = endY - inputStart.y;
        const threshold = 30;

        if (Math.sqrt(dx * dx + dy * dy) < threshold) return;

        let swipeDir;
        if (Math.abs(dx) > Math.abs(dy)) {
            swipeDir = dx > 0 ? DIR.RIGHT : DIR.LEFT;
        } else {
            swipeDir = dy > 0 ? DIR.DOWN : DIR.UP;
        }

        processMove(swipeDir);
    }

    function processMove(directionInput) {
        const active = pathSegments[0];
        if (!active) return;

        if (directionInput === active.direction) {
            state.score += 10 * state.combo;
            state.comboTracker++;
            if (state.comboTracker >= 5) {
                state.combo++;
                state.comboTracker = 0;
            }
            SoundSynth.play('success');
            spawnParticles(canvas.width / (window.devicePixelRatio || 1) / 2, canvas.height / (window.devicePixelRatio || 1) * 0.65, active.color);
            advancePath();
        } else {
            triggerFailure();
        }
        updateHUD();
    }

    function triggerFailure() {
        if (state.activePowerup === 'shield') {
            state.activePowerup = null;
            SoundSynth.play('success'); 
            advancePath();
            return;
        }

        state.lives--;
        state.combo = 1;
        state.comboTracker = 0;
        SoundSynth.play('fail');
        
        const dpr = window.devicePixelRatio || 1;
        spawnParticles(canvas.width / dpr / 2, canvas.height / dpr * 0.65, '#ff007f');

        if (state.lives <= 0) {
            endGame();
        } else {
            advancePath();
        }
        updateHUD();
    }

    canvas.addEventListener('mousedown', e => handleInputStart(e.clientX, e.clientY));
    canvas.addEventListener('mouseup', e => handleInputEnd(e.clientX, e.clientY));
    canvas.addEventListener('touchstart', e => {
        if(e.touches.length > 0) handleInputStart(e.touches[0].clientX, e.touches[0].clientY);
    }, {passive: true});
    canvas.addEventListener('touchend', e => {
        if(e.changedTouches.length > 0) handleInputEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
    }, {passive: true});

    window.addEventListener('keydown', e => {
        if (!state.isPlaying || state.isPaused) return;
        if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'w') processMove(DIR.UP);
        if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') processMove(DIR.RIGHT);
        if (e.key === 'ArrowDown' || e.key.toLowerCase() === 's') processMove(DIR.DOWN);
        if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') processMove(DIR.LEFT);
    });

    const uiMenu = document.getElementById('menu-overlay');
    const uiPause = document.getElementById('pause-overlay');
    const uiGameOver = document.getElementById('gameover-overlay');
    const pauseBtn = document.getElementById('pause-btn');
    
    document.getElementById('start-btn').addEventListener('click', () => { SoundSynth.init(); startGame(); });
    document.getElementById('restart-btn').addEventListener('click', startGame);
    pauseBtn.addEventListener('click', togglePause);
    document.getElementById('resume-btn').addEventListener('click', togglePause);

    document.getElementById('fs-btn').addEventListener('click', () => {
        const container = document.getElementById('game-container');
        if (!document.fullscreenElement) {
            container.requestFullscreen().catch(() => {});
        } else {
            document.exitFullscreen();
        }
    });

    function startGame() {
        state.score = 0;
        state.lives = 3;
        state.combo = 1;
        state.comboTracker = 0;
        state.speed = 1.0;
        state.timer = 1.0;
        state.activePowerup = null;
        state.powerupTime = 0;
        state.isPlaying = true;
        state.isPaused = false;

        resizeCanvas();
        initPath();
        particles = [];
        updateHUD();

        uiMenu.classList.add('hidden');
        uiGameOver.classList.add('hidden');
        uiPause.classList.add('hidden');
        
        lastTime = performance.now();
        requestAnimationFrame(gameLoop);
    }

    function togglePause() {
        if (!state.isPlaying) return;
        state.isPaused = !state.isPaused;
        if (state.isPaused) {
            uiPause.classList.remove('hidden');
            pauseBtn.innerText = "RESUME";
        } else {
            uiPause.classList.add('hidden');
            pauseBtn.innerText = "PAUSE";
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
    }

    function endGame() {
        state.isPlaying = false;
        if (state.score > state.highScore) {
            state.highScore = state.score;
            localStorage.setItem('cf_highscore', state.highScore);
        }
        document.getElementById('final-score-display').innerText = `SCORE: ${state.score}`;
        uiGameOver.classList.remove('hidden');
    }

    function updateHUD() {
        document.getElementById('score-val').innerText = `SCORE: ${state.score}`;
        document.getElementById('combo-val').innerText = `COMBO: x${state.combo}`;
        document.getElementById('lives-val').innerText = "❤️".repeat(Math.max(0, state.lives));
        document.getElementById('best-score-display').innerText = `HIGH SCORE: ${state.highScore}`;
    }

    function drawArrow(x, y, size, direction, color) {
        ctx.save();
        ctx.translate(x, y);
        const angles = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
        ctx.rotate(angles[direction]);

        ctx.strokeStyle = color;
        ctx.lineWidth = 6;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.shadowBlur = 15;
        ctx.shadowColor = color;

        ctx.beginPath();
        ctx.moveTo(0, size * 0.4);
        ctx.lineTo(0, -size * 0.4);
        ctx.moveTo(-size * 0.25, -size * 0.15);
        ctx.lineTo(0, -size * 0.4);
        ctx.lineTo(size * 0.25, -size * 0.15);
        ctx.stroke();
        ctx.restore();
    }

    function drawItem(x, y, type) {
        ctx.save();
        ctx.shadowBlur = 15;
        if (type === 'gem') {
            ctx.fillStyle = '#fffb00';
            ctx.shadowColor = '#fffb00';
            ctx.beginPath();
            ctx.moveTo(x, y - 12);
            ctx.lineTo(x + 10, y);
            ctx.lineTo(x, y + 12);
            ctx.lineTo(x - 10, y);
            ctx.closePath();
            ctx.fill();
        } else if (type === 'shield') {
            ctx.strokeStyle = '#00f3ff';
            ctx.shadowColor = '#00f3ff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.arc(x, y, 12, 0, Math.PI, false);
            ctx.lineTo(x, y - 12);
            ctx.closePath();
            ctx.stroke();
        } else if (type === 'slowmo') {
            ctx.strokeStyle = '#39ff14';
            ctx.shadowColor = '#39ff14';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.arc(x, y, 11, 0, Math.PI * 2);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y - 7);
            ctx.lineTo(x + 4, y);
            ctx.stroke();
        }
        ctx.restore();
    }

    function gameLoop(timestamp) {
        if (!state.isPlaying || state.isPaused) return;

        let dt = timestamp - lastTime;
        if (dt > 100 || dt <= 0) dt = 16.67; 
        lastTime = timestamp;

        const dpr = window.devicePixelRatio || 1;
        const viewW = canvas.width / dpr;
        const viewH = canvas.height / dpr;

        ctx.clearRect(0, 0, viewW, viewH);

        if (state.activePowerup) {
            state.powerupTime -= dt / 1000;
            if (state.powerupTime <= 0) state.activePowerup = null;
        }

        let speedModifier = state.activePowerup === 'slowmo' ? 0.4 : 1.0;
        let elapsedCountdown = (dt / (state.baseTimeout / state.speed)) * speedModifier;
        state.timer -= elapsedCountdown;
        
        const bar = document.getElementById('timer-bar');
        if(bar) bar.style.width = `${Math.max(0, state.timer * 100)}%`;
        
        if (state.timer <= 0) {
            triggerFailure();
        }

        ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
        ctx.lineWidth = 2;
        for (let i = 0; i < viewW; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, viewH);
            ctx.stroke();
        }

        const segmentHeight = viewH * 0.15;
        const startY = viewH * 0.65;

        for (let i = pathSegments.length - 1; i >= 0; i--) {
            let seg = pathSegments[i];
            if (!seg) continue;
            
            let yPos = startY - (i * segmentHeight);
            let widthScale = 140 - (i * 14);
            let xPos = viewW / 2 - widthScale / 2;

            ctx.save();
            ctx.strokeStyle = seg.color;
            ctx.lineWidth = i === 0 ? 5 : 2;
            ctx.shadowBlur = i === 0 ? 20 : 5;
            ctx.shadowColor = seg.color;
            ctx.fillStyle = 'rgba(20, 24, 33, 0.8)';
            
            ctx.beginPath();
            // Hardened fallback check for standard browser context variations
            if (ctx.roundRect) {
                ctx.roundRect(xPos, yPos - (segmentHeight / 2), widthScale, segmentHeight - 10, 8);
            } else {
                ctx.rect(xPos, yPos - (segmentHeight / 2), widthScale, segmentHeight - 10);
            }
            ctx.fill();
            ctx.stroke();
            ctx.restore();

            if (i === 0) {
                drawArrow(viewW / 2, yPos, 50, seg.direction, seg.color);
            } else {
                drawArrow(viewW / 2, yPos, 28, seg.direction, 'rgba(255,255,255,0.2)');
            }

            if (seg.item) {
                drawItem(xPos + widthScale - 20, yPos - (segmentHeight / 2) + 20, seg.item);
            }
        }

        if (state.activePowerup) {
            ctx.save();
            ctx.fillStyle = state.activePowerup === 'shield' ? '#00f3ff' : '#39ff14';
            ctx.font = "bold 14px monospace";
            ctx.textAlign = "center";
            ctx.fillText(`${state.activePowerup.toUpperCase()}: ${state.powerupTime.toFixed(1)}s`, viewW / 2, viewH * 0.78);
            ctx.restore();
        }

        for (let i = particles.length - 1; i >= 0; i--) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) particles.splice(i, 1);
        }

        requestAnimationFrame(gameLoop);
    }
    
    // Initial display sync
    updateHUD();
</script>

</body>
</html>
